<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blogs</title>
    <link rel="stylesheet" href="src/css/blog.css" />
    <link
      rel="shortcut icon"
      href="https://i.postimg.cc/ZR60xQ9Y/CV.webp"
      type="image/x-icon"
    />
  </head>
  <body>
    <section class="body">
      <!--------- Osmo [https://osmo.supply/] --------->
      <div class="parallax">
        <section class="parallax__header">
          <div class="parallax__visuals">
            <div class="parallax__black-line-overflow"></div>
            <div data-parallax-layers class="parallax__layers">
              <img
                src="https://cdn.prod.website-files.com/671752cd4027f01b1b8f1c7f/6717795be09b462b2e8ebf71_osmo-parallax-layer-3.webp"
                loading="eager"
                width="800"
                data-parallax-layer="1"
                alt=""
                class="parallax__layer-img"
              />
              <img
                src="https://cdn.prod.website-files.com/671752cd4027f01b1b8f1c7f/6717795b4d5ac529e7d3a562_osmo-parallax-layer-2.webp"
                loading="eager"
                width="800"
                data-parallax-layer="2"
                alt=""
                class="parallax__layer-img"
              />
              <div data-parallax-layer="3" class="parallax__layer-title">
                <h2 class="parallax__title">Blogs</h2>
              </div>
              <img
                src="https://cdn.prod.website-files.com/671752cd4027f01b1b8f1c7f/6717795bb5aceca85011ad83_osmo-parallax-layer-1.webp"
                loading="eager"
                width="800"
                data-parallax-layer="4"
                alt=""
                class="parallax__layer-img"
              />
            </div>
            <div class="parallax__fade"></div>
          </div>
        </section>

        <section class="parallax__content">
          <!--------- Osmo [https://osmo.supply/] --------->

          <div class="loki">
            <section class="cloneable">
              <div class="looping-words">
                <div class="looping-words__containers">
                  <ul data-looping-words-list class="looping-words__list">
                    <a
                      href="https://mathiasezequiellopezacosta.blogspot.com/2026/05/zarate-tierra-de-automoviles.html"
                      style="text-decoration: none"
                    >
                      <li class="looping-words__item">
                        <p class="looping-words__p">Toyota y Mercedes</p>
                      </li>
                    </a>
                    <a
                      href="https://tucvdigital.blogspot.com/2025/04/el-auge-de-los-hackers-eticos.html"
                      style="text-decoration: none"
                    >
                      <li class="looping-words__item">
                        <p class="looping-words__p">Technology</p>
                      </li></a
                    >
                    <a
                      href="https://tucvdigital.blogspot.com/2025/04/el-costo-oculto-de-la-ia.html"
                      style="text-decoration: none"
                    >
                      <li class="looping-words__item">
                        <p class="looping-words__p">Artificial Intelligence</p>
                      </li></a
                    >
                    <a
                      href="https://tucvdigital.blogspot.com/2025/04/por-que-el-scroll-horizontal-es-tan.html"
                      style="text-decoration: none"
                    >
                      <li class="looping-words__item">
                        <p class="looping-words__p">User Interface</p>
                      </li></a
                    >
                    <a
                      href="https://tucvdigital.blogspot.com/2025/04/murio-el-mobile-first.html"
                      style="text-decoration: none"
                    >
                      <li class="looping-words__item">
                        <p class="looping-words__p">User Experience</p>
                      </li></a
                    >
                    <a
                      href="https://tucvdigital.blogspot.com/2025/06/realmente-conviene-tener-un-portafolio.html"
                      style="text-decoration: none"
                    >
                      <li class="looping-words__item">
                        <p class="looping-words__p">¿Portfolio?</p>
                      </li></a
                    >
                    <a
                      href="https://tucvdigital.blogspot.com/2025/07/que-es-el-clean-code-no-es-solo-un-libro.html"
                      style="text-decoration: none"
                    >
                      <li class="looping-words__item">
                        <p class="looping-words__p">Clean Code</p>
                      </li></a
                    >
                  </ul>
                </div>
                <div class="looping-words__fade"></div>
                <div
                  data-looping-words-selector
                  class="looping-words__selector"
                >
                  <div class="looping-words__edge"></div>
                  <div class="looping-words__edge is--2"></div>
                  <div class="looping-words__edge is--3"></div>
                  <div class="looping-words__edge is--4"></div>
                </div>
              </div>
            </section>
          </div>

          <!--EN ESTE LUGAR QUIERO AGREGAR LA PAGINA ENTERA QUE COMPARTIRE MAS ADELANTE-->

              fill="currentColor"
            ></path>
          </svg>

        </section>
      </div>
      <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
      <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
      <script type="module" src="src/js/blog.js"></script>
    </section>
  </body>
</html>
